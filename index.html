<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="header.js"></script>
<title>Picross</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Spectral:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap');

html, body {
  margin: 0;
  min-height: 100vh;
  background: #DCD3B8;
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,0.4), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(255,255,255,0.25), transparent 45%);
  display: flex;
  flex-direction: column;
}

body {
  overflow-y: scroll;
}

.page-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 12px;
}
</style>
<style>
:root {
  --paper: #F2ECDC;
  --paper-deep: #E9E0CB;
  --ink: #2A2520;
  --ink-soft: #5C5346;
  --ink-faint: #948A78;
  --rule: #CABFA3;
  --rule-strong: #A8987A;
  --rust: #AE4528;
  --rust-soft: #C97256;
  --sage: #6E7F5C;
  --sage-deep: #4F5E40;
  --gold: #C9952E;
  --stamp-shadow: rgba(42,37,32,0.28);
  --paper-shadow: rgba(42,37,32,0.16);
  --cell: 27px;
  --clue-min: 27px;
  --clue-font: 12px;
}

* { box-sizing: border-box; }

#app {
  padding: 2.2rem 1.4rem 2.6rem;
  font-family: 'Spectral', Georgia, serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse at top left, rgba(255,255,255,0.5), transparent 55%),
    var(--paper);
  background-image:
    repeating-linear-gradient(0deg, rgba(42,37,32,0.025) 0px, transparent 1px, transparent 3px),
    radial-gradient(ellipse at top left, rgba(255,255,255,0.5), transparent 55%);
  border-radius: 18px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 18px 40px -22px rgba(42,37,32,0.35);
  position: relative;
  max-width: 720px;
  margin: 0 auto;
}

#app::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 1px solid var(--rule);
  border-radius: 12px;
  pointer-events: none;
}

.game-header {
  text-align: center;
  margin-bottom: 1.4rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--rule);
  position: relative;
}
.game-title {
  font-family: 'Fraunces', 'Spectral', serif;
  font-optical-sizing: auto;
  font-weight: 600;
  font-size: 30px;
  letter-spacing: 0.01em;
  margin: 0 0 2px;
  color: var(--ink);
}
.game-title .accent-dot { color: var(--rust); }
.game-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin: 0;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
}

.seg {
  display: flex;
  border: 1.5px solid var(--ink);
  border-radius: 7px;
  overflow: hidden;
  background: var(--paper);
  box-shadow: 0 2px 0 var(--stamp-shadow);
}
.seg button {
  border: none;
  border-right: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink-soft);
  padding: 7px 13px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.seg button:last-child { border-right: none; }
.seg button:hover:not(.active) { background: var(--paper-deep); }
.seg button.active {
  background: var(--ink);
  color: var(--paper);
}

.icon-btn {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 7px;
  padding: 7px 13px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 0 var(--stamp-shadow);
  transition: transform 0.08s, box-shadow 0.08s, background 0.12s;
}
.icon-btn:hover { background: var(--paper-deep); }
.icon-btn:active { transform: translateY(2px); box-shadow: 0 0 0 var(--stamp-shadow); }

#timer-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  min-width: 42px;
  background: var(--paper-deep);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 6px 9px;
  text-align: center;
}

.timer-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
  margin-left: auto;
}
.timer-label input { accent-color: var(--rust); cursor: pointer; }

.grid-wrap {
  overflow-x: auto;
  margin-bottom: 12px;
  padding: 18px 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent 30%);
  border-radius: 10px;
}

table.picross {
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  margin: 0 auto;
}
table.picross td { padding: 0; }

.clue {
  font-size: var(--clue-font);
  font-weight: 700;
  color: var(--ink-soft);
  text-align: center;
  user-select: none;
  transition: color 0.2s;
}
.clue.row-clue {
  text-align: right;
  padding-right: 7px;
  vertical-align: middle;
  white-space: nowrap;
  min-width: var(--clue-min);
  height: var(--cell);
  letter-spacing: -0.02em;
}
.clue.col-clue {
  vertical-align: bottom;
  padding-bottom: 4px;
  min-width: var(--cell);
  line-height: 1.2;
}
.clue.done {
  color: var(--sage-deep);
  background: rgba(110,127,92,0.14);
  border-radius: 4px;
  position: relative;
}
.clue.row-clue.done { padding-left: 4px; }
.clue.done span {
  position: relative;
  display: inline-block;
}
.clue.done span::after {
  content: '';
  position: absolute;
  left: -2px; right: -2px;
  top: 50%;
  height: 1.5px;
  background: var(--sage-deep);
  transform: translateY(-50%) scaleX(0);
  transform-origin: left;
  animation: strike 0.28s ease-out forwards;
}
@keyframes strike {
  to { transform: translateY(-50%) scaleX(1); }
}

.cell {
  width: var(--cell);
  height: var(--cell);
  border: 1px solid var(--rule);
  background: var(--paper);
  cursor: pointer;
  position: relative;
  transition: background 0.1s, box-shadow 0.15s;
}
.cell:hover { background: var(--paper-deep); }
.cell.filled {
  background: var(--ink);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), inset 2px 2px 4px rgba(0,0,0,0.35);
}
.cell.flash-ok {
  background: var(--sage) !important;
  box-shadow: inset 0 0 0 1px var(--sage-deep) !important;
}
.cell.hint-glow {
  outline: 2px solid var(--gold);
  outline-offset: -1px;
  box-shadow: 0 0 0 4px rgba(201,149,46,0.25);
}

.br { border-right: 2px solid var(--rule-strong) !important; }
.bb { border-bottom: 2px solid var(--rule-strong) !important; }

.legend {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.01em;
  color: var(--ink-faint);
  margin-top: 6px;
  text-align: center;
}

#win-overlay {
  display: none;
  margin-top: 18px;
  padding: 24px 20px;
  border-radius: 12px;
  border: 1.5px solid var(--sage-deep);
  background: linear-gradient(180deg, #EFF1E6, #E6EAD9);
  text-align: center;
  box-shadow: 0 10px 24px -14px rgba(42,37,32,0.3);
}
#win-overlay .win-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 24px;
  color: var(--sage-deep);
  margin: 0 0 6px;
}
#win-overlay .win-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  letter-spacing: 0.01em;
  color: var(--ink-soft);
  margin: 0 0 16px;
}
#confetti-canvas {
  position: absolute;
  pointer-events: none;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
#win-wrap { position: relative; }

.hints-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
}

@media (max-width: 600px) {
  #app { padding: 1.6rem 0.7rem 1.8rem; border-radius: 14px; }
  .grid-wrap { padding: 12px 6px; }
  .game-title { font-size: 24px; }
  .icon-btn, .seg button { padding: 6px 9px; font-size: 11px; }
  .toolbar { gap: 7px; }
}

@media (max-width: 480px) {
  :root { --cell: 22px; --clue-min: 22px; --clue-font: 10.5px; }
  #app { padding: 1.3rem 0.5rem 1.6rem; }
  .grid-wrap { padding: 10px 4px; }
  .game-title { font-size: 21px; }
  .game-subtitle { font-size: 10px; }
  .legend { font-size: 9.5px; line-height: 1.6; }
  .icon-btn, .seg button { padding: 5px 7px; font-size: 10.5px; }
  #timer-display { font-size: 11px; padding: 5px 7px; }
  .timer-label { font-size: 10px; }
  .clue.row-clue {
    white-space: normal;
    word-spacing: -2px;
    line-height: 1.05;
    padding-right: 4px;
    height: auto;
    min-height: var(--cell);
    max-width: 34px;
  }
}

@media (max-width: 360px) {
  :root { --cell: 19px; --clue-min: 19px; --clue-font: 9.5px; }
  #app { padding: 1.1rem 0.35rem 1.4rem; }
  .grid-wrap { padding: 8px 2px; }
  .clue.row-clue { padding-right: 4px; }
}
</style>
</head>
<body>
<header3-component></header3-component>
<div class="page-wrap">
<div id="app">
<header class="game-header">
  <h1 class="game-title">Picross<span class="accent-dot">.</span></h1>
  <p class="game-subtitle">A nonogram puzzle, freshly drawn</p>
</header>

<div class="toolbar">
  <div class="seg" id="diff-seg">
    <button class="active" onclick="setDiff('easy')">Easy (5×5)</button>
    <button onclick="setDiff('medium')">Medium (8×8)</button>
    <button onclick="setDiff('hard')">Hard (12×12)</button>
  </div>
  <button class="icon-btn" onclick="newPuzzle()"><i class="ti ti-refresh" aria-hidden="true"></i> New</button>
</div>

<div class="toolbar">
  <div class="seg" id="mode-seg">
    <button class="active" onclick="setMode('fill')"><i class="ti ti-pencil" aria-hidden="true"></i> Fill</button>
    <button onclick="setMode('erase')"><i class="ti ti-eraser" aria-hidden="true"></i> Erase</button>
  </div>
  <button class="icon-btn" onclick="doHint()"><i class="ti ti-bulb" aria-hidden="true"></i> Hint <span class="hints-badge" id="hints-left">(3)</span></button>
  <button class="icon-btn" onclick="resetPuzzle()"><i class="ti ti-trash" aria-hidden="true"></i> Reset</button>
  <label class="timer-label">
    <input type="checkbox" id="timer-toggle" checked onchange="toggleTimer()"> Timer
  </label>
  <span id="timer-display">0:00</span>
</div>

<div class="grid-wrap" id="grid-wrap"></div>
<p class="legend">Left-click fill &nbsp;|&nbsp; Drag across cells &nbsp;|&nbsp; Switch modes above on touch</p>

<div id="win-wrap">
  <div id="win-overlay">
    <p class="win-title" id="win-title">Puzzle solved!</p>
    <p class="win-sub" id="win-sub"></p>
    <button class="icon-btn" onclick="newPuzzle()" style="margin:auto;"><i class="ti ti-refresh" aria-hidden="true"></i> Play again</button>
  </div>
  <canvas id="confetti-canvas" width="680" height="220" style="display:none;"></canvas>
</div>
</div>
</div>

<script>
const DIFF = { easy:{r:5,c:5,density:0.55}, medium:{r:8,c:8,density:0.6}, hard:{r:12,c:12,density:0.65} };
let diff='easy', mode='fill', solution=[], grid=[], rows=5, cols=5;
let rowClues, colClues;
let hintsLeft=3, timerOn=true, seconds=0, timerInt=null, won=false;
let dragging=false, dragAction=null, confAnim=null;

function setDiff(d) {
  diff = d;
  document.querySelectorAll('#diff-seg button').forEach((b,i) => b.classList.toggle('active', ['easy','medium','hard'][i]===d));
  newPuzzle();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('#mode-seg button').forEach((b,i) => b.classList.toggle('active', ['fill','erase'][i]===m));
}

function rnd(p) { return Math.random() < p; }

function generateSolution(r, c, density) {
  let sol, attempts = 0;
  do {
    sol = Array.from({length:r}, () => Array.from({length:c}, () => rnd(density) ? 1 : 0));
    const hasRow = sol.every(row => row.some(v => v));
    const hasCol = Array.from({length:c}, (_,ci) => sol.some(row => row[ci])).every(Boolean);
    if (hasRow && hasCol) break;
  } while (++attempts < 80);
  return sol;
}

function cluesOf(lines) {
  return lines.map(line => {
    const cl = []; let n = 0;
    for (const v of line) { if (v) n++; else if (n) { cl.push(n); n=0; } }
    if (n) cl.push(n);
    return cl.length ? cl : [0];
  });
}

function newPuzzle() {
  const cfg = DIFF[diff]; rows=cfg.r; cols=cfg.c;
  solution = generateSolution(rows, cols, cfg.density);
  rowClues = cluesOf(solution);
  colClues = cluesOf(solution[0].map((_,ci) => solution.map(r => r[ci])));
  startFresh();
}

function resetPuzzle() {
  startFresh();
}

function startFresh() {
  clearInterval(timerInt); cancelAnimationFrame(confAnim);
  won=false; hintsLeft=3; seconds=0;
  document.getElementById('win-overlay').style.display = 'none';
  document.getElementById('confetti-canvas').style.display = 'none';
  document.getElementById('timer-display').textContent = '0:00';
  document.getElementById('hints-left').textContent = '(3)';

  grid = Array.from({length:rows}, () => Array(cols).fill(0));
  renderGrid();
  startTimer();
}

function startTimer() {
  clearInterval(timerInt);
  if (!timerOn) return;
  timerInt = setInterval(() => { if (!won) { seconds++; updateTimerDisplay(); } }, 1000);
}

function updateTimerDisplay() {
  if (!timerOn) { document.getElementById('timer-display').textContent = ''; return; }
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('timer-display').textContent = `${m}:${s<10?'0':''}${s}`;
}

function toggleTimer() {
  timerOn = document.getElementById('timer-toggle').checked;
  if (timerOn) { startTimer(); updateTimerDisplay(); }
  else { clearInterval(timerInt); document.getElementById('timer-display').textContent = ''; }
}

function renderGrid() {
  const mcl = Math.max(...colClues.map(c => c.length));
  let h = '<table class="picross"><tbody>';
  for (let ci = 0; ci < mcl; ci++) {
    h += '<tr><td class="clue"></td>';
    for (let c = 0; c < cols; c++) {
      const idx = ci - (mcl - colClues[c].length);
      const v = idx >= 0 ? colClues[c][idx] : '';
      const br = (c+1)%5===0 && c<cols-1 ? ' br' : '';
      h += `<td class="clue col-clue${br}" data-cc="${c}">${v===0?'':`<span>${v}</span>`}</td>`;
    }
    h += '</tr>';
  }
  for (let r = 0; r < rows; r++) {
    h += `<tr><td class="clue row-clue" data-rc="${r}"><span>${rowClues[r].join(' ')}</span></td>`;
    for (let c = 0; c < cols; c++) {
      const br = (c+1)%5===0 && c<cols-1 ? ' br' : '';
      const bb = (r+1)%5===0 && r<rows-1 ? ' bb' : '';
      h += `<td class="cell${br}${bb}" data-r="${r}" data-c="${c}"></td>`;
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = h;
  updateClueHighlights();
  bindEvents(wrap.querySelector('table'));
}

function getCell(r, c) { return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`); }

function bindEvents(table) {
  table.addEventListener('mousedown', e => {
    if (!e.target.dataset.r) return;
    e.preventDefault(); dragging=true; dragAction=null;
    applyCell(e.target);
  });
  table.addEventListener('mouseover', e => {
    if (!dragging || !e.target.dataset.r) return;
    applyCell(e.target);
  });
  table.addEventListener('mouseup', () => { dragging=false; dragAction=null; });
  table.addEventListener('contextmenu', e => e.preventDefault());
  table.addEventListener('touchstart', e => {
    e.preventDefault();
    const t=e.touches[0], el=document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.dataset.r) { dragging=true; dragAction=null; applyCell(el); }
  }, {passive:false});
  table.addEventListener('touchmove', e => {
    e.preventDefault();
    const t=e.touches[0], el=document.elementFromPoint(t.clientX, t.clientY);
    if (dragging && el && el.dataset.r) applyCell(el);
  }, {passive:false});
  table.addEventListener('touchend', () => { dragging=false; dragAction=null; });
}

function applyCell(el) {
  if (won) return;
  const r=+el.dataset.r, c=+el.dataset.c;
  if (mode==='erase') {
    grid[r][c] = 0;
  } else {
    if (dragAction===null) dragAction = grid[r][c]===1 ? 'unfill' : 'fill';
    grid[r][c] = dragAction==='fill' ? 1 : 0;
  }
  el.classList.toggle('filled', grid[r][c]===1);
  updateClueHighlights();
  checkAutoWin();
}

function updateClueHighlights() {
  for (let r = 0; r < rows; r++) {
    const done = JSON.stringify(cluesOf([grid[r]])[0]) === JSON.stringify(rowClues[r]);
    const el = document.querySelector(`.row-clue[data-rc="${r}"]`);
    if (el) el.classList.toggle('done', done);
  }
  for (let c = 0; c < cols; c++) {
    const col = grid.map(row => row[c]);
    const done = JSON.stringify(cluesOf([col])[0]) === JSON.stringify(colClues[c]);
    document.querySelectorAll(`.col-clue[data-cc="${c}"]`).forEach(el => el.classList.toggle('done', done));
  }
}

function checkAutoWin() {
  if (won) return;
  const perfect = solution.every((row, r) => row.every((v, c) => (v===1) === (grid[r][c]===1)));
  if (perfect) winGame();
}

function doHint() {
  if (won || hintsLeft <= 0) return;
  const empties = [];
  for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
    if (solution[r][c] && grid[r][c]!==1) empties.push([r,c]);
  if (!empties.length) return;
  const [r,c] = empties[Math.floor(Math.random()*empties.length)];
  grid[r][c] = 1;
  const el = getCell(r, c);
  if (el) { el.classList.add('filled','hint-glow'); setTimeout(()=>el.classList.remove('hint-glow'),900); }
  updateClueHighlights();
  hintsLeft--;
  document.getElementById('hints-left').textContent = `(${hintsLeft})`;
  checkAutoWin();
}

function winGame() {
  if (won) return;
  won = true; clearInterval(timerInt);
  for (let r=0; r<rows; r++) for (let c=0; c<cols; c++) {
    if (solution[r][c]) {
      const el = getCell(r, c);
      setTimeout(() => {
        if (el) { el.classList.add('flash-ok'); setTimeout(()=>el.classList.remove('flash-ok'), 400); }
      }, (r*cols+c)*18);
    }
  }
  setTimeout(() => {
    const m=Math.floor(seconds/60), s=seconds%60;
    const timeStr = timerOn ? ` in ${m}:${s<10?'0':''}${s}` : '';
    const hUsed = 3-hintsLeft;
    document.getElementById('win-sub').textContent = `${diff.charAt(0).toUpperCase()+diff.slice(1)} ${rows}×${cols}${timeStr} — ${hUsed ? hUsed+' hint'+(hUsed!==1?'s':'')+' used' : 'no hints used'}`;
    document.getElementById('win-overlay').style.display = 'block';
    startConfetti();
  }, rows*cols*18 + 300);
}

function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const COLORS = ['#AE4528','#6E7F5C','#C9952E','#2A2520','#C97256','#4F5E40'];
  const pieces = Array.from({length:65}, () => ({
    x: Math.random()*W, y: -10-Math.random()*60,
    w: 6+Math.random()*6, h: 3+Math.random()*4,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    vx: (Math.random()-0.5)*2.5, vy: 2+Math.random()*2.5,
    angle: Math.random()*Math.PI*2, va: (Math.random()-0.5)*0.15
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,W,H);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.angle+=p.va;
      if (p.y > H+10) { p.y=-10; p.x=Math.random()*W; }
    });
    frame++;
    if (frame < 220) confAnim = requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,W,H); canvas.style.display='none'; }
  }
  draw();
}

newPuzzle();
</script>
</body>
</html>
