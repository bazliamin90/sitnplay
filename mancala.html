<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mancala.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #f4efe6;
    --card: #fbf8f2;
    --ink: #1f1b16;
    --ink-soft: #6b6355;
    --rule: #d9d0bd;
    --rule-strong: #c7bca3;
    --accent: #c1440e;
    --accent-soft: #e8d9cc;
    --stone-1: #c1440e;
    --stone-2: #6b8f71;
    --stone-3: #5b7c99;
    --stone-4: #c99a2e;
    --stone-5: #8b5e6b;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  body {
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    padding: 40px 16px 64px;
  }

  .sheet {
    width: 100%;
    max-width: 880px;
    background: var(--card);
    border: 1px solid var(--rule-strong);
    border-radius: 20px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    padding: 40px 44px 32px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 46px;
    letter-spacing: 0.5px;
    margin: 0;
  }

  h1 .dot { color: var(--accent); }

  .subtitle {
    margin-top: 8px;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    text-transform: uppercase;
  }

  hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 28px 0;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .segmented {
    display: inline-flex;
    border: 1px solid var(--ink);
    border-radius: 10px;
    overflow: hidden;
  }

  .segmented button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 18px;
    background: var(--card);
    color: var(--ink);
    border: none;
    cursor: pointer;
    border-right: 1px solid var(--ink);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .segmented button:last-child { border-right: none; }

  .segmented button.active {
    background: var(--ink);
    color: var(--cream);
  }

  .segmented button:not(.active):hover {
    background: var(--accent-soft);
  }

  .btn-solid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 20px;
    border-radius: 10px;
    border: 1px solid var(--ink);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn-solid:hover { background: var(--accent-soft); }

  #difficultyWrap {
    display: none;
    align-items: center;
    gap: 14px;
  }

  #difficultyWrap.show { display: inline-flex; }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    margin-bottom: 26px;
    font-size: 13px;
  }

  .status-row .status {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status .pip {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .status .label {
    color: var(--ink-soft);
    letter-spacing: 1px;
  }

  .status .value {
    font-weight: 700;
  }

  .score {
    color: var(--ink-soft);
    letter-spacing: 1px;
  }

  .score b { color: var(--ink); font-weight: 700; }

  /* Board */
  .board-wrap {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 22px;
    max-width: 100%;
    overflow: hidden;
    margin: 0 auto;
  }

  .board {
    display: grid;
    grid-template-columns: clamp(52px, 10vw, 92px) repeat(6, minmax(0, 1fr)) clamp(52px, 10vw, 92px);
    grid-template-rows: auto auto;
    gap: clamp(6px, 1.4vw, 12px);
    align-items: stretch;
    max-width: 100%;
  }

  .store {
    grid-row: 1 / 3;
    border: 1px solid var(--ink);
    border-radius: var(--radius);
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 6px 10px;
    position: relative;
    height: 216px;
    min-width: 0;
    overflow: hidden;
  }

  .store .store-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
    flex-shrink: 0;
  }

  .store .store-count {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  .store .stones {
    position: relative;
    flex: 1;
    width: 100%;
  }

  .store.p1-store { order: 2; }
  .store.p2-store { order: 1; }

  #storeP2 { grid-column: 1; }
  #storeP1 { grid-column: 8; }

  .row-top, .row-bottom {
    display: contents;
  }

  .pit {
    border: 1px solid var(--rule-strong);
    background: var(--card);
    border-radius: 999px / 40%;
    height: 104px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 9px 4px 8px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }

  .pit .count {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .pit .stones {
    position: relative;
    flex: 1;
    width: 100%;
  }

  .overflow-tag {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 9px;
    font-weight: 700;
    color: var(--ink-soft);
    background: var(--accent-soft);
    border-radius: 999px;
    padding: 1px 6px;
    z-index: 4;
  }

  .pit.playable:hover {
    border-color: var(--ink);
    background: var(--accent-soft);
  }

  .pit.playable:active {
    transform: scale(0.97);
  }

  .pit.disabled {
    cursor: default;
    opacity: 0.55;
  }

  .pit.lifting {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 10px 18px rgba(31,27,22,0.12);
  }

  .pit.sowing {
    animation: landPulse 0.5s ease;
    border-color: var(--accent);
  }

  @keyframes landPulse {
    0% { transform: scale(1); background: var(--card); }
    35% { transform: scale(1.08); background: var(--accent-soft); }
    100% { transform: scale(1); background: var(--card); }
  }

  .pit.relay-pickup {
    animation: relayShake 0.45s ease;
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  @keyframes relayShake {
    0% { transform: translateX(0) scale(1); }
    20% { transform: translateX(-4px) scale(1.04); }
    40% { transform: translateX(4px) scale(1.04); }
    60% { transform: translateX(-3px) scale(1.02); }
    80% { transform: translateX(2px) scale(1.02); }
    100% { transform: translateX(0) scale(1); }
  }

  .pit.capture-flash {
    animation: captureFlash 0.7s ease;
  }

  @keyframes captureFlash {
    0% { background: var(--card); border-color: var(--rule-strong); }
    30% { background: var(--accent); border-color: var(--accent); }
    100% { background: var(--card); border-color: var(--rule-strong); }
  }

  .pit.empty-highlight {
    animation: pulse 0.5s ease;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(193,68,14,0.4); }
    100% { box-shadow: 0 0 0 10px rgba(193,68,14,0); }
  }

  .store {
    transition: border-color 0.2s ease;
  }

  .store.bump {
    animation: storeBump 0.5s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes storeBump {
    0% { transform: scale(1); }
    40% { transform: scale(1.09); border-color: var(--accent); }
    100% { transform: scale(1); }
  }

  .stone {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    box-shadow: inset 0 -2px 2px rgba(0,0,0,0.18), inset 0 1px 1px rgba(255,255,255,0.3), 0 1px 2px rgba(31,27,22,0.15);
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: var(--tf, translate(-50%, 0));
  }

  .stone.pop {
    animation: stoneDrop 0.42s cubic-bezier(.32,.9,.4,1.2);
  }

  @keyframes stoneDrop {
    0% { transform: var(--tf) translateY(-34px) scale(0.6); opacity: 0; }
    55% { transform: var(--tf) translateY(3px) scale(1.1); opacity: 1; }
    100% { transform: var(--tf) translateY(0) scale(1); opacity: 1; }
  }

  .stone-overflow {
    font-size: 10px;
    color: var(--ink-soft);
    align-self: center;
  }

  .toast {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 3px 10px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    animation: toastFloat 1.1s ease forwards;
  }

  @keyframes toastFloat {
    0% { opacity: 0; transform: translate(-50%, 6px) scale(0.9); }
    18% { opacity: 1; transform: translate(-50%, -6px) scale(1); }
    75% { opacity: 1; transform: translate(-50%, -10px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -22px) scale(0.95); }
  }

  footer {
    margin-top: 26px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    text-transform: uppercase;
  }

  .msg-banner {
    text-align: center;
    margin-top: 18px;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    min-height: 28px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .msg-banner.show {
    opacity: 1;
    transform: translateY(0);
  }


  @media (max-width: 720px) {
    .sheet { padding: 28px 16px 24px; }
    h1 { font-size: 34px; }
    .board-wrap { padding: 14px; }
    .store { height: 170px; }
    .pit { height: 82px; padding: 7px 3px 6px; }
    .controls { justify-content: center; }
  }

  @media (max-width: 460px) {
    .store { height: 150px; }
    .pit { height: 70px; }
    .stone { width: 12px; height: 12px; }
  }
</style>
</head>
<body>
<script src="nav.js"></script>
  
<div class="sheet">
  <header>
    <h1>Mancala<span class="dot">.</span></h1>
    <div class="subtitle">Six pits a side, one store to fill</div>
  </header>

  <div class="controls">
    <div class="segmented" id="modeToggle">
      <button data-mode="2p" class="active">2 Players</button>
      <button data-mode="cpu">Vs Computer</button>
    </div>

    <div class="segmented" id="difficultyWrap">
      <button data-diff="easy" class="active">Easy</button>
      <button data-diff="moderate">Moderate</button>
      <button data-diff="hard">Hard</button>
    </div>

    <button class="btn-solid" id="newGameBtn">New Game</button>
  </div>

  <div class="status-row">
    <div class="status">
      <span class="pip" id="turnPip"></span>
      <span class="label">Turn</span>
      <span class="value" id="turnValue">Player 1</span>
    </div>
    <div class="score">
      P1 <b id="scoreP1">0</b> &nbsp;–&nbsp; <b id="scoreP2">0</b> P2
    </div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="store p2-store" id="storeP2">
        <div class="store-label">P2 Store</div>
        <div class="store-count" id="storeP2Count">0</div>
        <div class="stones" id="storeP2Stones"></div>
      </div>

      <div class="row-top" id="rowTop"></div>

      <div class="store p1-store" id="storeP1">
        <div class="store-label">P1 Store</div>
        <div class="store-count" id="storeP1Count">0</div>
        <div class="stones" id="storeP1Stones"></div>
      </div>

      <div class="row-bottom" id="rowBottom"></div>
    </div>
  </div>

  <div class="msg-banner" id="msgBanner"></div>

  <footer>Land in your store to go again &nbsp;|&nbsp; Land in a full pit to keep sowing</footer>
</div>

<script>
(function(){
  // ---- Board model ----
  // indices 0-5: P1 pits, 6: P1 store, 7-12: P2 pits, 13: P2 store
  const P1_PITS = [0,1,2,3,4,5];
  const P2_PITS = [7,8,9,10,11,12];
  const P1_STORE = 6;
  const P2_STORE = 13;

  let board = [];
  let currentPlayer = 1;
  let mode = '2p'; // '2p' or 'cpu'
  let difficulty = 'easy';
  let gameOver = false;
  let animating = false;

  const modeToggle = document.getElementById('modeToggle');
  const difficultyWrap = document.getElementById('difficultyWrap');
  const newGameBtn = document.getElementById('newGameBtn');
  const turnValue = document.getElementById('turnValue');
  const turnPip = document.getElementById('turnPip');
  const scoreP1El = document.getElementById('scoreP1');
  const scoreP2El = document.getElementById('scoreP2');
  const rowTop = document.getElementById('rowTop');
  const rowBottom = document.getElementById('rowBottom');
  const storeP1Count = document.getElementById('storeP1Count');
  const storeP2Count = document.getElementById('storeP2Count');
  const storeP1Stones = document.getElementById('storeP1Stones');
  const storeP2Stones = document.getElementById('storeP2Stones');
  const msgBanner = document.getElementById('msgBanner');

  const STONE_COLORS = ['stone-1','stone-2','stone-3','stone-4','stone-5'];

  function newBoard() {
    const b = new Array(14).fill(4);
    b[P1_STORE] = 0;
    b[P2_STORE] = 0;
    return b;
  }

  function opposite(i) { return 12 - i; }

  function ownerOf(i) {
    if (P1_PITS.includes(i) || i === P1_STORE) return 1;
    if (P2_PITS.includes(i) || i === P2_STORE) return 2;
    return null;
  }

  function isStore(i) { return i === P1_STORE || i === P2_STORE; }

  function pitsOf(player) { return player === 1 ? P1_PITS : P2_PITS; }
  function storeOf(player) { return player === 1 ? P1_STORE : P2_STORE; }
  function opponentStoreOf(player) { return player === 1 ? P2_STORE : P1_STORE; }

  function sideEmpty(player) {
    return pitsOf(player).every(i => board[i] === 0);
  }

  function legalMoves(player, b) {
    return pitsOf(player).filter(i => b[i] > 0);
  }

  // Simulates a move on a board copy. Returns { board, extraTurn, capture }
  function simulateMove(b0, player, pit) {
    const b = b0.slice();
    let stones = b[pit];
    b[pit] = 0;
    let idx = pit;
    const oppStore = opponentStoreOf(player);
    let extraTurn = false;
    let captured = false;
    let guard = 0;

    while (true) {
      while (stones > 0) {
        idx = (idx + 1) % 14;
        if (idx === oppStore) continue; // skip opponent's store
        b[idx] += 1;
        stones--;
      }

      if (idx === storeOf(player)) {
        extraTurn = true;
        break;
      }

      if (b[idx] > 1) {
        // relay: the pit already had stones in it, pick them all up and keep sowing
        stones = b[idx];
        b[idx] = 0;
        guard++;
        if (guard > 200) break; // safety net, should never trigger
        continue;
      }

      // landed in a pit that was empty before this stone -> turn ends here
      if (ownerOf(idx) === player) {
        const opp = opposite(idx);
        if (b[opp] > 0) {
          b[storeOf(player)] += b[opp] + 1;
          b[opp] = 0;
          b[idx] = 0;
          captured = true;
        }
      }
      break;
    }

    // end-game sweep
    if (pitsOf(1).every(i => b[i] === 0)) {
      P2_PITS.forEach(i => { b[P2_STORE] += b[i]; b[i] = 0; });
    } else if (pitsOf(2).every(i => b[i] === 0)) {
      P1_PITS.forEach(i => { b[P1_STORE] += b[i]; b[i] = 0; });
    }

    return { board: b, extraTurn, captured };
  }

  // ---- Rendering ----
  function seededRand(seed) {
    const x = Math.sin(seed * 12.9898) * 43758.5453;
    return x - Math.floor(x); // deterministic 0..1
  }

  function stoneTransform(pileId, k) {
    const jx = (seededRand(pileId * 97.13 + k * 13.37) - 0.5) * 16;   // -8..8 px sideways jitter
    const jy = (seededRand(pileId * 53.7 + k * 7.77) - 0.5) * 4;      // -2..2 px organic jitter
    const rot = (seededRand(pileId * 31.4 + k * 3.11) - 0.5) * 42;    // -21..21 deg tilt
    const stackStep = 6.5; // vertical overlap between stacked beads
    const y = -(k * stackStep) + jy;
    return 'translate(calc(-50% + ' + jx.toFixed(1) + 'px), ' + y.toFixed(1) + 'px) rotate(' + rot.toFixed(1) + 'deg)';
  }

  function stoneEl(seed, pileId, k) {
    const el = document.createElement('div');
    el.className = 'stone ' + STONE_COLORS[seed % STONE_COLORS.length];
    el.style.setProperty('--tf', stoneTransform(pileId, k));
    el.style.zIndex = String(k);
    return el;
  }

  function renderStones(container, count, maxShow, popLast, pileId) {
    container.innerHTML = '';
    const showOverflow = count > maxShow;
    const show = showOverflow ? maxShow - 1 : count;
    for (let k = 0; k < show; k++) {
      const el = stoneEl(k + count, pileId, k);
      if (popLast && k === show - 1) el.classList.add('pop');
      container.appendChild(el);
    }
    if (showOverflow) {
      const tag = document.createElement('div');
      tag.className = 'overflow-tag';
      tag.textContent = '+' + (count - show);
      container.appendChild(tag);
    }
  }

  function buildPitEl(i) {
    const pit = document.createElement('div');
    pit.className = 'pit';
    pit.dataset.idx = i;
    const count = document.createElement('div');
    count.className = 'count';
    count.textContent = String(board[i]);
    const stones = document.createElement('div');
    stones.className = 'stones';
    pit.appendChild(count);
    pit.appendChild(stones);
    pit.addEventListener('click', () => onPitClick(i));
    return pit;
  }

  function buildBoardOnce() {
    rowTop.innerHTML = '';
    rowBottom.innerHTML = '';
    // top row left-to-right = indices 12,11,10,9,8,7
    [12,11,10,9,8,7].forEach(i => rowTop.appendChild(buildPitEl(i)));
    // bottom row left-to-right = indices 0..5
    [0,1,2,3,4,5].forEach(i => rowBottom.appendChild(buildPitEl(i)));
  }

  function render() {
    updatePitVisuals();
    storeP1Count.textContent = board[P1_STORE];
    storeP2Count.textContent = board[P2_STORE];
    renderStones(storeP1Stones, board[P1_STORE], 16, false, P1_STORE);
    renderStones(storeP2Stones, board[P2_STORE], 16, false, P2_STORE);

    scoreP1El.textContent = board[P1_STORE];
    scoreP2El.textContent = board[P2_STORE];

    turnValue.textContent = mode === 'cpu' && currentPlayer === 2 ? 'Computer' : ('Player ' + currentPlayer);
    turnPip.style.background = currentPlayer === 1 ? 'var(--accent)' : 'var(--ink)';
  }

  function updatePitVisuals() {
    document.querySelectorAll('.pit').forEach(pitEl => {
      const i = parseInt(pitEl.dataset.idx, 10);
      const countEl = pitEl.querySelector('.count');
      const stonesEl = pitEl.querySelector('.stones');
      countEl.textContent = String(board[i]);
      renderStones(stonesEl, board[i], 9, false, i);

      const isCurrentSide = ownerOf(i) === currentPlayer;
      const humanTurn = !(mode === 'cpu' && currentPlayer === 2);
      const playable = !gameOver && !animating && isCurrentSide && board[i] > 0 && humanTurn;
      pitEl.classList.toggle('playable', playable);
      pitEl.classList.toggle('disabled', !playable);
    });
  }

  // ---- Game flow ----
  function startNewGame() {
    board = newBoard();
    currentPlayer = 1;
    gameOver = false;
    animating = false;
    msgBanner.textContent = '';
    msgBanner.classList.remove('show');
    render();
  }

  function onPitClick(i) {
    if (gameOver || animating) return;
    if (mode === 'cpu' && currentPlayer === 2) return;
    if (ownerOf(i) !== currentPlayer) return;
    if (board[i] === 0) return;
    animateMove(i, currentPlayer, () => {
      afterMove();
    });
  }

  function afterMove() {
    checkGameOver();
    if (gameOver) { render(); return; }
    render();
    if (mode === 'cpu' && currentPlayer === 2 && !gameOver) {
      animating = true;
      setTimeout(cpuTurn, 750);
    }
  }

  function checkGameOver() {
    if (sideEmpty(1) || sideEmpty(2)) {
      gameOver = true;
      const p1 = board[P1_STORE], p2 = board[P2_STORE];
      let text;
      if (p1 === p2) text = "It's a draw.";
      else text = (p1 > p2 ? 'Player 1' : (mode === 'cpu' ? 'Computer' : 'Player 2')) + ' wins, ' + Math.max(p1,p2) + '–' + Math.min(p1,p2) + '.';
      msgBanner.textContent = text;
      requestAnimationFrame(() => msgBanner.classList.add('show'));
    }
  }

  const SOW_DELAY = 480;
  const RELAY_DELAY = 640;
  const LIFT_DELAY = 320;

  function updatePitContent(i, popLast) {
    const el = document.querySelector('.pit[data-idx="' + i + '"]');
    if (!el) return;
    const countEl = el.querySelector('.count');
    const stonesEl = el.querySelector('.stones');
    countEl.textContent = String(board[i]);
    renderStones(stonesEl, board[i], 9, popLast, i);
  }

  function updateStoreContent(player, bump) {
    const store = storeOf(player);
    const countEl = player === 1 ? storeP1Count : storeP2Count;
    const stonesEl = player === 1 ? storeP1Stones : storeP2Stones;
    countEl.textContent = board[store];
    renderStones(stonesEl, board[store], 16, bump, store);
    scoreP1El.textContent = board[P1_STORE];
    scoreP2El.textContent = board[P2_STORE];
    if (bump) {
      const storeElDom = document.getElementById(player === 1 ? 'storeP1' : 'storeP2');
      storeElDom.classList.remove('bump');
      void storeElDom.offsetWidth;
      storeElDom.classList.add('bump');
      setTimeout(() => storeElDom.classList.remove('bump'), 520);
    }
  }

  function showToast(el, text) {
    if (!el) return;
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = text;
    el.appendChild(t);
    setTimeout(() => t.remove(), 1150);
  }

  function flashCapture(landIdx, oppIdx, player, amount) {
    [landIdx, oppIdx].forEach(i => {
      const el = document.querySelector('.pit[data-idx="' + i + '"]');
      if (!el) return;
      el.classList.remove('capture-flash');
      void el.offsetWidth;
      el.classList.add('capture-flash');
      setTimeout(() => el.classList.remove('capture-flash'), 720);
    });
    updateStoreContent(player, true);
    const storeElDom = document.getElementById(player === 1 ? 'storeP1' : 'storeP2');
    showToast(storeElDom, '+' + amount);
  }

  // Animate sowing stone-by-stone, then resolve capture/extra-turn, then hand off turn.
  function animateMove(pit, player, done) {
    animating = true;
    updatePitVisuals();

    const sourceEl = document.querySelector('.pit[data-idx="' + pit + '"]');
    if (sourceEl) sourceEl.classList.add('lifting');

    const stones = board[pit];
    let idx = pit;
    const oppStore = opponentStoreOf(player);
    let remaining = 0;
    let guard = 0;

    setTimeout(() => {
      if (sourceEl) sourceEl.classList.remove('lifting');
      board[pit] = 0;
      updatePitContent(pit, false);
      remaining = stones;
      step();
    }, LIFT_DELAY);

    function step() {
      if (remaining <= 0) {
        checkLanding();
        return;
      }
      idx = (idx + 1) % 14;
      if (idx === oppStore) { step(); return; }
      board[idx] += 1;
      remaining--;
      if (isStore(idx)) {
        updateStoreContent(ownerOf(idx), true);
      } else {
        updatePitContent(idx, true);
        highlightPit(idx);
      }
      setTimeout(step, SOW_DELAY);
    }

    function checkLanding() {
      if (idx === storeOf(player)) {
        resolveEnd(true);
        return;
      }
      if (board[idx] > 1) {
        // relay: pit already had stones, pick them all up and keep sowing
        guard++;
        if (guard > 200) { resolveEnd(false); return; }
        const el = document.querySelector('.pit[data-idx="' + idx + '"]');
        if (el) {
          el.classList.remove('relay-pickup');
          void el.offsetWidth;
          el.classList.add('relay-pickup');
          setTimeout(() => el.classList.remove('relay-pickup'), 460);
        }
        remaining = board[idx];
        board[idx] = 0;
        updatePitContent(idx, false);
        setTimeout(step, RELAY_DELAY);
        return;
      }
      resolveEnd(false);
    }

    function resolveEnd(extraTurn) {
      let capturedAmount = 0;
      if (!extraTurn && ownerOf(idx) === player) {
        const opp = opposite(idx);
        if (board[opp] > 0) {
          capturedAmount = board[opp] + 1;
          board[storeOf(player)] += capturedAmount;
          board[opp] = 0;
          board[idx] = 0;
        }
      }
      // end game sweep
      if (pitsOf(1).every(i => board[i] === 0)) {
        P2_PITS.forEach(i => { board[P2_STORE] += board[i]; board[i] = 0; });
      } else if (pitsOf(2).every(i => board[i] === 0)) {
        P1_PITS.forEach(i => { board[P1_STORE] += board[i]; board[i] = 0; });
      }

      animating = false;
      if (!extraTurn) {
        currentPlayer = player === 1 ? 2 : 1;
      }
      render();

      if (capturedAmount > 0) {
        flashCapture(idx, opposite(idx), player, capturedAmount);
        setTimeout(done, 560);
      } else if (extraTurn) {
        const storeElDom = document.getElementById(player === 1 ? 'storeP1' : 'storeP2');
        showToast(storeElDom, 'Go again!');
        setTimeout(done, 260);
      } else {
        done();
      }
    }
  }

  function highlightPit(i) {
    const el = document.querySelector('.pit[data-idx="' + i + '"]');
    if (el) {
      el.classList.remove('sowing');
      void el.offsetWidth;
      el.classList.add('sowing');
      setTimeout(() => el.classList.remove('sowing'), 480);
    }
  }

  // ---- CPU AI ----
  function heuristic(b, aiPlayer) {
    const humanPlayer = aiPlayer === 1 ? 2 : 1;
    let score = (b[storeOf(aiPlayer)] - b[storeOf(humanPlayer)]) * 10;
    // slight preference for keeping own pits non-empty near capture range, and stones on own side
    pitsOf(aiPlayer).forEach(i => { score += (b[i] > 0 && b[i] < 3) ? 0.5 : 0; });
    return score;
  }

  function minimax(b, depth, aiPlayer, playerToMove, alpha, beta) {
    const overP1 = pitsOf(1).every(i => b[i] === 0);
    const overP2 = pitsOf(2).every(i => b[i] === 0);
    if (depth === 0 || overP1 || overP2) {
      return { score: heuristic(b, aiPlayer) };
    }
    const moves = legalMoves(playerToMove, b);
    if (moves.length === 0) {
      return { score: heuristic(b, aiPlayer) };
    }

    const maximizing = playerToMove === aiPlayer;
    let best = maximizing ? -Infinity : Infinity;
    let bestMove = moves[0];

    for (const m of moves) {
      const res = simulateMove(b, playerToMove, m);
      const nextPlayer = res.extraTurn ? playerToMove : (playerToMove === 1 ? 2 : 1);
      const nextDepth = depth - 1;
      const child = minimax(res.board, nextDepth, aiPlayer, nextPlayer, alpha, beta);
      const val = child.score;

      if (maximizing) {
        if (val > best) { best = val; bestMove = m; }
        alpha = Math.max(alpha, best);
      } else {
        if (val < best) { best = val; bestMove = m; }
        beta = Math.min(beta, best);
      }
      if (beta <= alpha) break;
    }
    return { score: best, move: bestMove };
  }

  function cpuChooseMove() {
    const moves = legalMoves(2, board);
    if (moves.length === 0) return null;

    if (difficulty === 'easy') {
      // Mostly random, occasionally takes an obvious free store move
      const freeMove = moves.find(m => {
        const res = simulateMove(board, 2, m);
        return res.extraTurn;
      });
      if (freeMove !== undefined && Math.random() < 0.5) return freeMove;
      return moves[Math.floor(Math.random() * moves.length)];
    }

    let depth = difficulty === 'moderate' ? 4 : 8;
    const result = minimax(board, depth, 2, 2, -Infinity, Infinity);
    return result.move !== undefined ? result.move : moves[0];
  }

  function cpuTurn() {
    if (gameOver) { animating = false; return; }
    const move = cpuChooseMove();
    if (move === null || move === undefined) { animating = false; return; }
    animateMove(move, 2, () => {
      checkGameOver();
      render();
      if (!gameOver && mode === 'cpu' && currentPlayer === 2) {
        animating = true;
        setTimeout(cpuTurn, 750);
      }
    });
  }

  // ---- Controls wiring ----
  modeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    modeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    difficultyWrap.classList.toggle('show', mode === 'cpu');
    startNewGame();
  });

  difficultyWrap.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    difficultyWrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    startNewGame();
  });

  newGameBtn.addEventListener('click', startNewGame);

  buildBoardOnce();
  startNewGame();
})();
</script>
</body>
</html>
